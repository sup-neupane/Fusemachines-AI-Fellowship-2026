version: "3.8"

services:
  db:
    image: postgres:15
    container_name: my_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: unless-stopped